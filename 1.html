<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register and login</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            
        }
        h1 {
            font-size: 144px;
            margin-bottom: 30px;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center; 
        }
        .button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 30px 60px;
            margin: 15px 0; 
            cursor: pointer;
            font-size: 60px;
            border-radius: 15px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #0056b3;
        }
        .form-container {
            display: none; 
            flex-direction: column;
            align-items: center;
        }
        .input {
            padding: 30px;
            margin: 30px 0; 
            font-size: 60px; 
            border-radius: 15px; 
            border: 3px solid #ccc; 
            width: 600px;
            background-color: #333;
            color: white;
        }
        .actions {
            display: flex;
            justify-content: space-between;
            width: 100%;
            position: absolute;
            bottom: 60px; 
        }
    </style>
</head>
<body>
    <div class="registration-container">
        <h1>System Control Version</h1>
        <div class="button-container">
            <button class="button" id="registerButton">Register</button>
            <button class="button" id="loginButton">Login</button>
        </div>
    </div>

    <div class="form-container" id="formContainer">
        <input type="text" class="input" id="email" placeholder="E-mail" required>
        <input type="password" class="input" id="password" placeholder="Password" required>
        <div class="actions">
            <button class="button" id="backButton">Back</button>
            <button class="button" id="okButton">OK</button>
        </div>
    </div>

    <script>
        document.getElementById('registerButton').onclick = function() {
            document.querySelector('.registration-container').style.display = 'none';
            document.getElementById('formContainer').style.display = 'flex';
            document.getElementById('okButton').onclick = function() {
                alert('Регистрация завершена!');
            };
        };

        document.getElementById('loginButton').onclick = function() {
            document.querySelector('.registration-container').style.display = 'none';
            document.getElementById('formContainer').style.display = 'flex';
            document.getElementById('okButton').onclick = function() {
            window.location.href = 'next_page.html';
        };
        };

        document.getElementById('backButton').onclick = function() {
            document.querySelector('.registration-container').style.display = 'flex';
            document.getElementById('formContainer').style.display = 'none';
        };
    </script>
</body>
</html>
