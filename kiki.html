<!DOCTYPE html>
<html>
<head>
<title>system control version</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
  margin: 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background-color: #f6f8fa;
  color: #24292e; 
}

nav {
  background-color: #24292e; 
  color: #fff;
  padding: 20px 30px; 
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1); 
}

nav ul {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
}

nav li {
  margin-right: 40px;
  font-size: 1.1em;
}

nav a {
  text-decoration: none;
  color: #fff;
  font-size: 1.1em;
  transition: color 0.3s ease; 
}

nav a:hover {
  color: #9bc53d;
}

.account-button {
  background-color: #28a745; 
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1em;
  transition:  0.3s ease;
  font-weight: 600;
}

.account-button:hover {
  background-color: #218838;
}

.sidebar {
  background-color: #ffffff;
  width: 350px; 
  padding: 30px; 
  overflow-y: auto;
  display: none; 
  position: fixed; 
  top: 0;
  left: 0;
  height: 100%;
  transition: all 0.3s ease; 
  box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1); 
  font-size: 1em;
}

.sidebar.open {
  display: block; 
}

.new-repo-button {
  background-color: #28a745; 
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  margin-top: 20px; 
  cursor: pointer;
  font-size: 1em;
  transition: background-color 0.3s ease;
  font-weight: 600;
}

.new-repo-button:hover {
  background-color: #218838; 
}

main {
  padding: 30px; 
  flex: 1;
  font-size: 1em;
}

ul.repo-list {
  list-style: none;
  padding: 0;
}

ul.repo-list li {
  padding: 15px 0;
  border-bottom: 1px solid #eee;
  font-size: 1em;
}

h1 {
  font-size: 2em; 
  font-weight: 600;
  margin-bottom: 20px;
}

h2 {
  font-size: 1.5em; 
  font-weight: 500;
}

p {
  font-size: 1em; 
}

a {
  text-decoration: none;
  color: #0366d6; 
  font-size: 1em;
  transition: color 0.3s ease;
}

a:hover {
  color: #005cc5;
}

.juytix-button {
  display: block;
  margin-bottom: 20px; 
  background-color: #28a745;
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1em;
  transition:  0.3s ease;
  font-weight: 600;
  text-align: center;
  width: fit-content;
  margin: 0 auto;
}


.juytix-button:hover {
  background-color: #218838; 
}
</style>
</head>
<body>
  

<nav>
  <ul>
    <li><a href="#">Главная</a></li>
    <li><a href="#">Контакты</a></li>
  </ul>
  <button class="account-button" onclick="toggleSidebar()">Профиль</button>
</nav>

<div class="sidebar" id="sidebar">
  <a href="profil.html" class="juytix-button">juytix</a>
  <ul class="repo-list">
    <li>Readme.md</li>
    <li>stopapypa.md</li>
    <li>juytix.md</li>
  </ul>
</div>

<main>
  <h1>Система контроля версий</h1>
  <a href="rep.html" class="new-repo-button">Создать репозиторий</a>
</main>

<script>
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('open');
}
</script>

</body>
</html>
